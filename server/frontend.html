<!DOCTYPE html>
<html>
<head>
    <title>Support AI Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 { color: #38bdf8; }

        .controls button {
            margin: 5px;
            padding: 10px 15px;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .controls button:hover {
            background: #1d4ed8;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            flex: 1;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
        }

        pre {
            max-height: 300px;
            overflow-y: auto;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }

        .score-box {
            margin-top: 15px;
            font-size: 16px;
            color: white;
        }
    </style>
</head>
<body>

<h1>🤖 Support AI Environment</h1>

<div class="controls">
    <button onclick="resetEnv()">Reset</button>
    <button onclick="getState()">Get State</button>
    <button onclick="getScore()">Get Score</button>

    <button onclick="stepEnv('reply')">Reply</button>
    <button onclick="stepEnv('request_info')">Request Info</button>
    <button onclick="stepEnv('escalate')">Escalate</button>
</div>

<div class="container">

    <div class="panel">
        <h3>Response Output</h3>
        <pre id="output">Start by clicking Reset</pre>

        <div class="score-box" id="scoreBox">
            Score: ---
        </div>
    </div>

    <div class="panel">
        <h3>Reward Graph</h3>
        <canvas id="rewardChart"></canvas>
    </div>

</div>

<script>
    let rewards = [];
    let steps = [];

    const ctx = document.getElementById('rewardChart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Reward per Step',
                data: [],
                borderWidth: 2
            }]
        }
    });

    function updateChart() {
        chart.data.labels = steps;
        chart.data.datasets[0].data = rewards;
        chart.update();
    }

    function display(data) {
        document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
    }

    function updateScore(score) {
        document.getElementById("scoreBox").innerText =
            "Score: " + score;
    }

    async function resetEnv() {
        const res = await fetch("/reset", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({})
        });
        const data = await res.json();

        rewards = [];
        steps = [];
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        chart.update();

        updateScore("-");
        display(data);
    }

    async function getState() {
        const res = await fetch("/state");
        const data = await res.json();
        display(data);
    }

    async function getScore() {
        const res = await fetch("/score");
        const data = await res.json();
        updateScore(data.score);
        display(data);
    }

    async function stepEnv(actionType) {
        const res = await fetch("/step_logged", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: { action_type: actionType }
            })
        });

        const data = await res.json();

        if (data.reward !== undefined) {
            rewards.push(data.reward);
            steps.push("Step " + rewards.length);
            updateChart();
        }

        display(data);
        getScore();
    }
</script>

</body>
</html>
